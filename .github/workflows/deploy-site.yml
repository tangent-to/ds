name: Deploy Site

# Manual only: run from the Actions tab ("Run workflow"). Builds the full docs
# site — tutorials converted from notebooks + generated API reference — and
# publishes it to the gh-pages branch (the configured Pages source).
#
# Consolidates the previous docs.yml + jekyll.yml + publish.yml deploy-site job
# into a single deploy so the live site is built one way, once.
on:
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install nbconvert
        run: pip install nbconvert jupyter

      - name: Convert notebooks to tutorials
        run: |
          # Create tutorials directory
          mkdir -p docs/_tutorials

          # Convert each notebook
          jupyter nbconvert --to markdown \
            --output-dir=docs/_tutorials \
            examples/user-guide/01-ordination.ipynb

          jupyter nbconvert --to markdown \
            --output-dir=docs/_tutorials \
            examples/user-guide/02-statistics.ipynb

          jupyter nbconvert --to markdown \
            --output-dir=docs/_tutorials \
            examples/user-guide/03-clustering.ipynb

          jupyter nbconvert --to markdown \
            --output-dir=docs/_tutorials \
            examples/user-guide/04-ml.ipynb

          # Add front matter to converted files
          for file in docs/_tutorials/*.md; do
            filename=$(basename "$file" .md)
            case "$filename" in
              "01-ordination")
                title="Ordination Analysis"
                order=1
                ;;
              "02-statistics")
                title="Statistical Analysis"
                order=2
                ;;
              "03-clustering")
                title="Clustering"
                order=3
                ;;
              "04-ml")
                title="Machine Learning"
                order=4
                ;;
            esac

            # Prepend front matter
            temp_file=$(mktemp)
            echo "---" > "$temp_file"
            echo "layout: default" >> "$temp_file"
            echo "title: \"$title\"" >> "$temp_file"
            echo "parent: Tutorials" >> "$temp_file"
            echo "nav_order: $order" >> "$temp_file"
            echo "---" >> "$temp_file"
            echo "" >> "$temp_file"
            cat "$file" >> "$temp_file"
            mv "$temp_file" "$file"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate API reference from JSDoc (TypeDoc)
        run: npm run docs:api

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          enable_jekyll: true
