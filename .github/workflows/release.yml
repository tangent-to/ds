name: Release

# Triggered by pushing a version tag created with `npm version` (see RELEASING.md):
#   npm version patch && git push --follow-tags
# Publishes the version in package.json / deno.json to npm and JSR, each with
# provenance. Safe to re-run: the npm job skips a version already on the registry.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance attestation + JSR OIDC authentication

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Pin npm 11: trusted publishing needs >= 11.5.1, and npm 12.0.0
      # (released 2026-07-08) broke the publish step the day it became
      # `latest` — every tag run after it failed where 11.x had succeeded
      # hours earlier. Bump deliberately, not by tracking `latest`.
      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1 and Node >= 22.14)
        run: npm install -g npm@11
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Test
        run: npm run test:run
      - name: Publish (skip if this version is already on npm)
        run: |
          NAME=$(node -p 'require("./package.json").name')
          VER=$(node -p 'require("./package.json").version')
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping."
          else
            npm publish --provenance --access public
          fi

  jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Install npm dependencies (e.g. ml-matrix) into node_modules so deno can
      # resolve the bare npm imports in src/ when caching and publishing; JSR
      # itself does not vendor them, but publish-time resolution needs them present.
      # (npm is available on the runner; `deno install` chokes on the lockfile here.)
      - name: Install npm dependencies
        run: npm install --no-audit --no-fund --ignore-scripts
      # Vouch for the resolved dependency graph with the supply-chain cooldown
      # disabled, so a package can be released the same day as an intra-suite
      # dependency it was just published alongside. No-op for dependency-free
      # leaves. Writes an (untracked) deno.lock, hence --allow-dirty below.
      - name: Resolve dependencies (bypass cooldown for intra-suite deps)
        run: deno cache --minimum-dependency-age=0 src/index.js
      # Idempotent like the npm job: a Release run can half-succeed (JSR
      # published, npm not), and re-running it must not fail on the half
      # that already went out.
      - name: Publish (skip if this version is already on JSR)
        run: |
          NAME=$(node -p 'require("./deno.json").name')
          VER=$(node -p 'require("./deno.json").version')
          if curl -fsS "https://jsr.io/${NAME}/${VER}_meta.json" >/dev/null 2>&1; then
            echo "$NAME@$VER already on JSR — skipping."
          else
            deno publish --allow-dirty
          fi
