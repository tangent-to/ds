name: Publish to npm

# Manual only: run from the Actions tab ("Run workflow") after bumping the
# version and pushing the tag. Publishes the version currently in package.json.
on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use for re-publishing only)'
        required: false
        default: false
        type: boolean

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        if: ${{ !inputs.skip_tests }}
        run: npm run test:run

      - name: Build browser bundle
        run: npm run build:browser

      - name: Verify package
        run: npm run verify

      - name: Publish to npm
        # Skip when this exact version is already on the registry, but let
        # any other publish failure fail the workflow.
        run: |
          PKG_NAME=$(node -p 'require("./package.json").name')
          PKG_VERSION=$(node -p 'require("./package.json").version')
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already published, skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
