name: Publish to JSR

# Manual only: run from the Actions tab ("Run workflow"). Publishes the version
# currently in jsr.json / deno.json. Independent of the npm workflow.
on:
  workflow_dispatch:

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for dependencies)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish to JSR
        run: deno publish
